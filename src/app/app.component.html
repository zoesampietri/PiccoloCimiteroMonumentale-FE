<!-- Componente principale dell'applicazione Angular. Si lega a <app-root> del file index.html e crea la barra di navigazione e il 
piè di pagina che rimangono fissi durante la navigazione e lascia lo spazio per il contenuto dei componenti che si aggancia a router-outlet -->

<div class="app-container">
  <header class="main-header">

    <div class="logo-container">
      <!-- Logo a sinistra -->
      <a class="navbar-brand" href="/">     <!-- Link al logo che porta alla home page -->
          <img src="Logo.svg" alt="Logo" class="logo">
      </a>
    </div>

    <nav class="nav-links">   <!-- La destra i link per la navigazione -->

      <div class="dropdown">    <!-- Dropdown per i servizi -->
        <button class="dropdown-btn" (click)="$event.stopPropagation(); toggleDropdown()">    <!-- Bottone per aprire il dropdown, cogela l'evento e poi lo inverte lo stato -->
          Servizi ▾
        </button>
        <div class="dropdown-content" *ngIf="isDropdownOpen">
          <a routerLink="/servizipersonali" (click)="closeDropdown()">Vedi miei servizi</a>
          <a routerLink="/catalogo" (click)="closeDropdown()">Tutti i servizi</a>
        </div>
      </div>
      
      <a routerLink="/mappa" class="mappa-link"> Mappa</a>

      <a routerLink="/dashboardadmin" class="admin-link"> Dashboard Amministratore</a>
    </nav>
  </header>

  <main class="content">
    <router-outlet></router-outlet>     <!-- Qui vengono caricate le componenti in base alla rotta -->
  </main>

  <footer class="main-footer">    <!-- Footer con 3 colonne -->
    <div class="footer-content">

      <div class="footer-section">
        <img src="Logo.svg" class="white-logo" alt="Logo">
        <p>In memoria della nostra comunità dal 1869.</p>
      </div>

      <div class="footer-section">
        <h3>Orari di Apertura</h3>
        <p>Lun-Ven: 9:00 - 19:00<br>Sab-Dom: 10:00 - 17:00</p>
      </div>

      <div class="footer-section">
        <h3>Contatti</h3>
        <p>Tel: (+39) 012 345 6789<br>Mail: info&#64;piccolocimiteromonumentale.it</p>  
      </div>

    </div>
  </footer>
</div>
