<button mat-stroked-button (click)="openDialog()">Aggiungi Defunto</button>
<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> Id. </th>
    <td mat-cell *matCellDef="let element"> {{element.id}} </td>
  </ng-container>

  <!-- Nome Column -->
  <ng-container matColumnDef="nome">
    <th mat-header-cell *matHeaderCellDef> Nome </th>
    <td mat-cell *matCellDef="let element"> {{element.nome}} </td>
  </ng-container>

  <!-- Cognome Column -->
  <ng-container matColumnDef="cognome">
    <th mat-header-cell *matHeaderCellDef> Cognome </th>
    <td mat-cell *matCellDef="let element"> {{element.cognome}} </td>
  </ng-container>

  <!-- Sesso Column -->
  <ng-container matColumnDef="sesso">
    <th mat-header-cell *matHeaderCellDef> Sesso </th>
    <td mat-cell *matCellDef="let element"> {{element.sesso}} </td>
  </ng-container>

  <!-- Codice Fiscale Column -->
  <ng-container matColumnDef="codicefiscale">
    <th mat-header-cell *matHeaderCellDef> Codice Fiscale </th>
    <td mat-cell *matCellDef="let element"> {{element.codiceFiscale}} </td>
  </ng-container>

  <!-- Action Column -->
  <ng-container matColumnDef="action">
    <th mat-header-cell *matHeaderCellDef> Action </th>
    <td mat-cell *matCellDef="let element"><button mat-stroked-button (click)="deleteItem(element.id)">Elimina</button></td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
